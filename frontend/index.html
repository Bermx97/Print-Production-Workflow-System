<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>My Orders</title>
</head>
<body>

  <h1>My Orders</h1>

  <button onclick="loadOrders()">Odśwież</button>
  <button onclick="logout()">Logout</button>

  <div id="orders"></div>
    <a href="create-order.html">
    <button>Create order</button>
  </a>

  <script>

    
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/login.html";
    }

    async function loadOrders() {
      const res = await fetch("/orders/my", {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const orders = await res.json();

      const container = document.getElementById("orders");
      container.innerHTML = "";

      orders.forEach(order => {
        const div = document.createElement("div");

        div.style.border = "1px solid black";
        div.style.padding = "10px";
        div.style.margin = "10px";

        div.innerHTML = `
          <p><b>Order:</b> ${order.order_number}</p>
          <p><b>Steps:</b> ${order.completed_steps.join(", ")}</p>
          <button onclick="completeOrder(${order.order_number})">
            Skończ krok
          </button>
        `;

        container.appendChild(div);
      });
    }

    async function completeOrder(orderNumber) {
      await fetch(`/orders/${orderNumber}/nextStep`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json"
        }
      });

      loadOrders();
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/login.html";
    }

    loadOrders();
  </script>

</body>
</html>
